<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Topia Training Hub</title>
<style>
  :root {
    --carbon: #2D2926;
    --carbon-soft: #3A3531;
    --stone: #D6D2C4;
    --stone-light: #FAF9F6;
    --stone-mid: #B4B2A9;
    --muted: #5F5E5A;
    --muted-light: #888780;
    --error: #A32D2D;
  }

  @font-face {
    font-family: 'Adieu';
    src: local('Adieu');
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Untitled Serif', Georgia, serif;
    background: var(--carbon);
    color: var(--stone);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  h1, h2, h3, .heading {
    font-family: 'Adieu', Arial, sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    font-weight: 500;
  }

  .mono { font-family: 'Favorit Mono', 'Courier New', monospace; }

  .wrap {
    max-width: 1040px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
  }

  .view { display: none; }
  .view.active { display: block; animation: fade 0.25s ease; }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }

  /* ---------- top bar ---------- */
  .topbar {
    display: flex; align-items: center; justify-content: center;
    padding: 1.5rem 0 0.5rem;
  }
  .logo {
    height: 38px; width: auto;
  }
  .logo-fallback {
    width: 56px; height: 56px; border-radius: 50%;
    background: var(--stone); color: var(--carbon);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Adieu', Arial, sans-serif; font-size: 12px; letter-spacing: 0.05em;
  }

  /* ---------- landing ---------- */
  .landing-center {
    min-height: 70vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .landing-center h1 { font-size: 24px; color: var(--stone); margin-bottom: 8px; }
  .landing-center .sub { font-size: 15px; color: var(--stone-mid); margin-bottom: 2.5rem; }

  .card-light {
    background: var(--stone-light);
    border-radius: 14px;
    color: var(--carbon);
  }

  .email-card {
    width: 100%; max-width: 380px; padding: 2rem;
    display: flex; flex-direction: column; gap: 14px;
  }
  .email-card label { font-size: 13px; color: var(--muted); font-weight: 600; }

  input[type=email] {
    height: 44px; border-radius: 8px; border: 1px solid var(--stone-mid);
    padding: 0 14px; font-size: 15px; background: #fff; color: var(--carbon);
    font-family: 'Untitled Serif', Georgia, serif;
  }
  input[type=email]:focus { outline: 2px solid var(--carbon); outline-offset: 1px; }

  .btn {
    height: 44px; border-radius: 8px; border: none; cursor: pointer;
    font-family: 'Adieu', Arial, sans-serif; text-transform: uppercase;
    letter-spacing: 0.04em; font-size: 14px; font-weight: 500;
    transition: opacity 0.15s ease, transform 0.05s ease;
  }
  .btn:active { transform: scale(0.985); }
  .btn-primary { background: var(--carbon); color: var(--stone); }
  .btn-primary:hover { opacity: 0.9; }
  .btn-light { background: var(--stone); color: var(--carbon); }
  .btn-light:hover { opacity: 0.9; }
  .btn-ghost { background: transparent; color: var(--stone); border: 1px solid var(--stone-mid); }
  .btn-ghost:hover { background: var(--carbon-soft); }

  .err { font-size: 13px; color: var(--error); display: none; }
  .err.show { display: block; }

  /* ---------- dashboard ---------- */
  .dash-grid {
    display: grid; grid-template-columns: 1fr 1.25fr; gap: 22px;
    margin-top: 1.5rem;
  }
  @media (max-width: 820px) { .dash-grid { grid-template-columns: 1fr; } }

  .panel { padding: 1.5rem; }
  .panel-left { display: flex; flex-direction: column; gap: 1.25rem; }

  .eyebrow {
    font-family: 'Favorit Mono', 'Courier New', monospace;
    font-size: 11px; color: var(--muted); text-transform: uppercase;
    letter-spacing: 0.08em; margin-bottom: 6px;
  }
  .panel-left h2 { font-size: 19px; color: var(--carbon); }
  .panel-left .topic-sub { font-size: 14px; color: var(--muted); margin-top: 6px; }

  .render-box {
    background: #fff; border-radius: 8px; border: 1px solid var(--stone-mid);
    aspect-ratio: 16 / 10; display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .render-box img { width: 100%; height: 100%; object-fit: contain; }
  .render-box .ph { font-size: 12px; color: var(--muted-light); text-transform: uppercase; letter-spacing: 0.05em; font-family: 'Favorit Mono', monospace; }

  .score-block { border-top: 1px solid var(--stone-mid); padding-top: 1rem; }
  .score-big { font-size: 30px; color: var(--carbon); font-family: 'Adieu', Arial, sans-serif; }
  .score-pct { font-size: 14px; color: var(--muted); }
  .score-meta { font-size: 12px; color: var(--muted-light); margin-top: 8px; font-family: 'Favorit Mono', monospace; }

  .right-stack { display: flex; flex-direction: column; gap: 16px; }
  .chart-card { padding: 1.5rem; }
  .chart-wrap { position: relative; height: 190px; }

  .legend { display: flex; gap: 18px; font-size: 12px; color: var(--stone-mid); padding-left: 2px; }
  .legend span { display: flex; align-items: center; gap: 5px; }
  .swatch { width: 11px; height: 11px; border-radius: 2px; display: inline-block; }

  /* ---------- video ---------- */
  .center-narrow { max-width: 760px; margin: 1.5rem auto 0; }
  .video-frame {
    position: relative; width: 100%; padding-top: 56.25%;
    border-radius: 12px; overflow: hidden; background: #1A1816;
  }
  .video-frame iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
  .btn-row { display: flex; gap: 12px; margin-top: 1.5rem; }
  .btn-row .btn { flex: 1; }

  /* ---------- quiz ---------- */
  .quiz-narrow { max-width: 560px; margin: 1.5rem auto 0; }
  .progress { font-family: 'Favorit Mono', monospace; font-size: 12px; color: var(--stone-mid);
    text-transform: uppercase; letter-spacing: 0.08em; text-align: center; margin-bottom: 1rem; }
  .q-card { padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
  .q-image { background: #fff; border-radius: 8px; border: 1px solid var(--stone-mid);
    max-height: 220px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
  .q-image img { width: 100%; height: 100%; object-fit: contain; max-height: 220px; }
  .q-text { font-size: 17px; color: var(--carbon); line-height: 1.5;
    font-family: 'Adieu', Arial, sans-serif; text-transform: none; letter-spacing: 0; font-weight: 500; }
  .options { display: flex; flex-direction: column; gap: 9px; }
  .opt {
    display: flex; align-items: center; gap: 11px; padding: 13px 15px;
    border-radius: 8px; border: 1px solid var(--stone-mid); background: #fff;
    cursor: pointer; font-size: 15px; color: var(--carbon); transition: border-color 0.12s ease;
  }
  .opt:hover { border-color: var(--carbon); }
  .opt.selected { border: 2px solid var(--carbon); padding: 12px 14px; }
  .opt input { margin: 0; accent-color: var(--carbon); }

  /* ---------- results ---------- */
  .result-narrow { max-width: 520px; margin: 2rem auto 0; text-align: center; }
  .result-card { padding: 2.5rem 2rem; }
  .result-score { font-size: 52px; color: var(--carbon); font-family: 'Adieu', Arial, sans-serif; line-height: 1; }
  .result-pct { font-size: 17px; color: var(--muted); margin-top: 10px; }
  .result-msg { font-size: 15px; color: var(--carbon); margin: 1.5rem 0; line-height: 1.6; }

  .spinner-wrap { min-height: 50vh; display: flex; align-items: center; justify-content: center; }
  .spinner {
    width: 34px; height: 34px; border: 3px solid var(--stone-mid);
    border-top-color: var(--stone); border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); }
</style>
</head>
<body>

<div class="wrap">

  <!-- ============ LANDING ============ -->
  <section id="view-landing" class="view active">
    <div class="topbar">
      <img src="logo.svg" alt="Topia" class="logo" onerror="this.outerHTML='<div class=\'logo-fallback\'>TOPIA</div>'" />
    </div>
    <div class="landing-center">
      <h1>Training hub</h1>
      <p class="sub">Enter your work email to continue</p>
      <div class="card-light email-card">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="you@topiawater.com" autocomplete="email" />
        <div class="err" id="landing-err">That email isn't on the list. Check with Technical.</div>
        <button class="btn btn-primary" id="enter-btn">Continue</button>
      </div>
    </div>
  </section>

  <!-- ============ DASHBOARD ============ -->
  <section id="view-dashboard" class="view">
    <div class="topbar">
      <img src="logo.svg" alt="Topia" class="logo" onerror="this.outerHTML='<div class=\'logo-fallback\'>TOPIA</div>'" />
    </div>
    <div id="dash-loading" class="spinner-wrap"><div class="spinner" role="status" aria-label="Loading"></div></div>
    <div id="dash-content" style="display:none;">
      <div class="dash-grid">
        <div class="card-light panel panel-left">
          <div>
            <div class="eyebrow">This week's topic</div>
            <h2 id="topic-title">—</h2>
            <p class="topic-sub" id="topic-week"></p>
          </div>
          <div class="render-box" id="render-box">
            <span class="ph">Product render</span>
          </div>
          <button class="btn btn-primary" id="start-training-btn">Start training</button>
          <div class="score-block">
            <div class="eyebrow">Your latest score</div>
            <div id="my-score-area">
              <span class="score-meta">No attempt yet this week</span>
            </div>
          </div>
        </div>

        <div class="right-stack">
          <div class="card-light chart-card">
            <div class="eyebrow">This week's scores</div>
            <div class="chart-wrap"><canvas id="weekChart" role="img" aria-label="This week's average scores by department"></canvas></div>
          </div>
          <div class="card-light chart-card">
            <div class="eyebrow">Lifetime average</div>
            <div class="chart-wrap"><canvas id="lifetimeChart" role="img" aria-label="Lifetime average scores by department"></canvas></div>
          </div>
          <div class="legend">
            <span><span class="swatch" style="background:var(--carbon)"></span>Your department</span>
            <span><span class="swatch" style="background:var(--stone-mid)"></span>Other departments</span>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- ============ VIDEO ============ -->
  <section id="view-video" class="view">
    <div class="topbar">
      <img src="logo.svg" alt="Topia" class="logo" onerror="this.outerHTML='<div class=\'logo-fallback\'>TOPIA</div>'" />
    </div>
    <div class="center-narrow">
      <div class="video-frame" id="video-frame"></div>
      <div class="btn-row">
        <button class="btn btn-ghost" id="video-back-btn">Back to homepage</button>
        <button class="btn btn-light" id="video-quiz-btn">Take the quiz</button>
      </div>
    </div>
  </section>

  <!-- ============ QUIZ ============ -->
  <section id="view-quiz" class="view">
    <div class="topbar">
      <img src="logo.svg" alt="Topia" class="logo" onerror="this.outerHTML='<div class=\'logo-fallback\'>TOPIA</div>'" />
    </div>
    <div class="quiz-narrow">
      <div class="progress" id="quiz-progress">Question 1</div>
      <div class="card-light q-card" id="q-card">
        <div class="q-image" id="q-image" style="display:none;"></div>
        <div class="q-text" id="q-text">—</div>
        <div class="options" id="q-options"></div>
      </div>
      <div class="btn-row">
        <button class="btn btn-ghost" id="prev-btn">Previous</button>
        <button class="btn btn-light" id="next-btn">Next</button>
      </div>
    </div>
  </section>

  <!-- ============ RESULTS ============ -->
  <section id="view-results" class="view">
    <div class="topbar">
      <img src="logo.svg" alt="Topia" class="logo" onerror="this.outerHTML='<div class=\'logo-fallback\'>TOPIA</div>'" />
    </div>
    <div class="result-narrow">
      <div class="card-light result-card">
        <div class="eyebrow">Your result</div>
        <div class="result-score" id="result-score">0/0</div>
        <div class="result-pct" id="result-pct">0%</div>
        <p class="result-msg" id="result-msg"></p>
        <div class="btn-row" style="flex-direction:column;">
          <button class="btn btn-primary" id="rewatch-btn">Rewatch video</button>
          <button class="btn btn-ghost" id="retake-btn" style="color:var(--carbon); border-color:var(--stone-mid);">Retake quiz</button>
          <button class="btn btn-ghost" id="result-home-btn" style="color:var(--carbon); border-color:var(--stone-mid);">Back to homepage</button>
        </div>
      </div>
    </div>
  </section>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
// ====== CONFIG ======
const API_URL = "https://script.google.com/macros/s/AKfycbzYpNaoWmEmMKtcfojNdoDX7ptgN94eCB6j47t9aDIMisPWv7FymL6R352sii8mNr_olA/exec";

// ====== STATE ======
let userEmail = sessionStorage.getItem("topiaEmail") || "";
let userDept = "";
let moduleData = null;   // { week, title, videoID, questions[] }
let answers = [];        // user's selected answers, index-aligned to questions
let currentQ = 0;
let weekChart = null, lifetimeChart = null;

// ====== HELPERS ======
function show(viewId) {
  document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
  document.getElementById(viewId).classList.add("active");
  window.scrollTo(0, 0);
}

// Strip a YouTube ID out of whatever is stored (full URL or bare ID)
function extractVideoId(raw) {
  if (!raw) return "";
  raw = String(raw).trim();
  const m = raw.match(/(?:v=|youtu\.be\/|embed\/)([a-zA-Z0-9_-]{6,})/);
  if (m) return m[1];
  return raw; // assume it's already an ID
}

async function apiGet(params) {
  const url = API_URL + "?" + new URLSearchParams(params).toString();
  const res = await fetch(url);
  return res.json();
}

async function apiPost(body) {
  const res = await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify(body)
  });
  return res.json();
}

// ====== LANDING / LOGIN ======
const emailInput = document.getElementById("email");
const landingErr = document.getElementById("landing-err");

document.getElementById("enter-btn").addEventListener("click", login);
emailInput.addEventListener("keydown", e => { if (e.key === "Enter") login(); });

async function login() {
  const email = emailInput.value.trim().toLowerCase();
  landingErr.classList.remove("show");
  if (!email || !email.includes("@")) {
    landingErr.textContent = "Please enter a valid email address.";
    landingErr.classList.add("show");
    return;
  }
  document.getElementById("enter-btn").textContent = "Checking...";
  const data = await apiGet({ action: "getDashboard", email });
  document.getElementById("enter-btn").textContent = "Continue";

  if (data.error) {
    landingErr.textContent = "That email isn't on the list. Check with Technical.";
    landingErr.classList.add("show");
    return;
  }
  userEmail = email;
  sessionStorage.setItem("topiaEmail", email);
  renderDashboard(data);
  show("view-dashboard");
}

// ====== DASHBOARD ======
async function loadDashboard() {
  show("view-dashboard");
  document.getElementById("dash-loading").style.display = "flex";
  document.getElementById("dash-content").style.display = "none";
  const data = await apiGet({ action: "getDashboard", email: userEmail });
  if (data.error) { logout(); return; }
  renderDashboard(data);
}

function renderDashboard(data) {
  userDept = data.department || "";
  document.getElementById("topic-title").textContent = data.title || "—";
  document.getElementById("topic-week").textContent = data.week ? ("Week " + data.week) : "";

  // product render
  const box = document.getElementById("render-box");
  if (data.productImage) {
    box.innerHTML = '<img src="' + data.productImage + '" alt="' + (data.title || "Product") + '" onerror="this.parentNode.innerHTML=\'<span class=ph>Image unavailable</span>\'" />';
  } else {
    box.innerHTML = '<span class="ph">No render yet</span>';
  }

  // my latest score
  const scoreArea = document.getElementById("my-score-area");
  if (data.myLatest) {
    scoreArea.innerHTML =
      '<span class="score-big">' + data.myLatest.score + '/' + data.myLatest.total + '</span>' +
      ' <span class="score-pct">' + data.myLatest.pct + '%</span>';
  } else {
    scoreArea.innerHTML = '<span class="score-meta">No attempt yet this week</span>';
  }

  drawCharts(data.thisWeekScores || [], data.lifetimeScores || []);

  document.getElementById("dash-loading").style.display = "none";
  document.getElementById("dash-content").style.display = "block";
}

function barColors(rows) {
  return rows.map(r => (r.department === userDept ? "#2D2926" : "#B4B2A9"));
}

function drawCharts(weekRows, lifeRows) {
  if (weekChart) weekChart.destroy();
  if (lifetimeChart) lifetimeChart.destroy();

  weekChart = new Chart(document.getElementById("weekChart"), {
    type: "bar",
    data: {
      labels: weekRows.map(r => r.department),
      datasets: [{ data: weekRows.map(r => r.avgScore), backgroundColor: barColors(weekRows), borderRadius: 4 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      scales: {
        y: { beginAtZero: true, max: 100, ticks: { callback: v => v + "%", color: "#5F5E5A" }, grid: { color: "#C5C1B5" } },
        x: { ticks: { color: "#5F5E5A" }, grid: { display: false } }
      },
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => c.parsed.y + "%" } } }
    }
  });

  lifetimeChart = new Chart(document.getElementById("lifetimeChart"), {
    type: "bar",
    data: {
      labels: lifeRows.map(r => r.department),
      datasets: [{
        data: lifeRows.map(r => r.avgScore),
        backgroundColor: "#FAF9F6",
        borderColor: barColors(lifeRows),
        borderWidth: 2, borderRadius: 4
      }]
    },
    options: {
      indexAxis: "y",
      responsive: true, maintainAspectRatio: false,
      scales: {
        x: { beginAtZero: true, max: 100, ticks: { callback: v => v + "%", color: "#5F5E5A" }, grid: { color: "#C5C1B5" } },
        y: { ticks: { color: "#5F5E5A" }, grid: { display: false } }
      },
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => c.parsed.x + "%" } } }
    }
  });
}

// ====== START TRAINING -> load module, show video ======
document.getElementById("start-training-btn").addEventListener("click", startTraining);

async function startTraining() {
  const btn = document.getElementById("start-training-btn");
  btn.textContent = "Loading...";
  const data = await apiGet({ action: "getModule", email: userEmail });
  btn.textContent = "Start training";
  if (data.error) { alert(data.error); return; }
  moduleData = data;
  answers = new Array(data.questions.length).fill(null);
  loadVideo();
  show("view-video");
}

function loadVideo() {
  const id = extractVideoId(moduleData.videoID);
  document.getElementById("video-frame").innerHTML =
    '<iframe src="https://www.youtube.com/embed/' + id + '" title="Training video" ' +
    'allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" ' +
    'allowfullscreen></iframe>';
}

document.getElementById("video-back-btn").addEventListener("click", () => { stopVideo(); loadDashboard(); });
document.getElementById("video-quiz-btn").addEventListener("click", () => { stopVideo(); startQuiz(); });

function stopVideo() {
  document.getElementById("video-frame").innerHTML = "";
}

// ====== QUIZ ======
function startQuiz() {
  currentQ = 0;
  renderQuestion();
  show("view-quiz");
}

function renderQuestion() {
  const q = moduleData.questions[currentQ];
  const total = moduleData.questions.length;
  document.getElementById("quiz-progress").textContent = "Question " + (currentQ + 1) + " of " + total;

  const imgBox = document.getElementById("q-image");
  if (q.imageURL) {
    imgBox.style.display = "flex";
    imgBox.innerHTML = '<img src="' + q.imageURL + '" alt="Question image" onerror="this.parentNode.style.display=\'none\'" />';
  } else {
    imgBox.style.display = "none";
    imgBox.innerHTML = "";
  }

  document.getElementById("q-text").textContent = q.questionText;

  const opts = [
    { key: "A", val: q.optionA },
    { key: "B", val: q.optionB },
    { key: "C", val: q.optionC },
    { key: "D", val: q.optionD }
  ].filter(o => o.val !== "" && o.val !== null && o.val !== undefined);

  const container = document.getElementById("q-options");
  container.innerHTML = "";
  opts.forEach(o => {
    const selected = answers[currentQ] === o.key;
    const label = document.createElement("label");
    label.className = "opt" + (selected ? " selected" : "");
    label.innerHTML =
      '<input type="radio" name="q" value="' + o.key + '"' + (selected ? " checked" : "") + ' /> ' +
      '<span>' + o.val + '</span>';
    label.querySelector("input").addEventListener("change", () => {
      answers[currentQ] = o.key;
      renderQuestion();
    });
    container.appendChild(label);
  });

  document.getElementById("prev-btn").style.visibility = currentQ === 0 ? "hidden" : "visible";
  document.getElementById("next-btn").textContent = (currentQ === total - 1) ? "Submit" : "Next";
}

document.getElementById("prev-btn").addEventListener("click", () => {
  if (currentQ > 0) { currentQ--; renderQuestion(); }
});

document.getElementById("next-btn").addEventListener("click", () => {
  const total = moduleData.questions.length;
  if (currentQ < total - 1) {
    currentQ++; renderQuestion();
  } else {
    submitQuiz();
  }
});

async function submitQuiz() {
  // require all answered
  const firstUnanswered = answers.findIndex(a => a === null);
  if (firstUnanswered !== -1) {
    currentQ = firstUnanswered;
    renderQuestion();
    document.getElementById("quiz-progress").textContent =
      "Please answer all questions — Question " + (firstUnanswered + 1) + " of " + answers.length;
    return;
  }

  const btn = document.getElementById("next-btn");
  btn.textContent = "Submitting...";
  const data = await apiPost({ action: "submitQuiz", email: userEmail, answers });
  if (data.error) { alert(data.error); btn.textContent = "Submit"; return; }
  showResults(data);
}

function showResults(data) {
  const pct = data.total > 0 ? Math.round((data.score / data.total) * 100) : 0;
  document.getElementById("result-score").textContent = data.score + "/" + data.total;
  document.getElementById("result-pct").textContent = pct + "%";

  let msg;
  if (pct === 100) msg = "Perfect score. You know this product inside out.";
  else if (pct >= 70) msg = "Solid work. You've got a good handle on this one.";
  else if (pct >= 40) msg = "Not bad — worth a rewatch to lock in the details.";
  else msg = "Give the video another watch and try again — you'll get there.";
  document.getElementById("result-msg").textContent = msg;

  if (data.videoID) moduleData.videoID = data.videoID;
  show("view-results");
}

// ====== RESULTS ACTIONS ======
document.getElementById("rewatch-btn").addEventListener("click", () => { loadVideo(); show("view-video"); });
document.getElementById("retake-btn").addEventListener("click", () => {
  answers = new Array(moduleData.questions.length).fill(null);
  startQuiz();
});
document.getElementById("result-home-btn").addEventListener("click", loadDashboard);

// ====== LOGOUT / RESET ======
function logout() {
  sessionStorage.removeItem("topiaEmail");
  userEmail = "";
  show("view-landing");
}

// ====== AUTO-LOGIN IF SESSION EXISTS ======
if (userEmail) {
  loadDashboard();
}
</script>
</body>
</html>
